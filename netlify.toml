[build]
  publish = "."

# Pretty URL redirects
[[redirects]]
  from = "/shop"
  to = "/pages/shop.html"
  status = 301
  force = true

[[redirects]]
  from = "/products"
  to = "/pages/shop.html"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/pages/blog.html"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
